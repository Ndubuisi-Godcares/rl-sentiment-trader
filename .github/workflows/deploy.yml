name: Deploy to HF Spaces + Vercel

on:
  push:
    branches: [production]

jobs:
  # ── Backend → Hugging Face Spaces ─────────────────────────────────────────
  deploy-backend:
    name: Push backend to HF Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Spaces
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE:    ${{ secrets.HF_SPACE_NAME }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name  "GitHub Actions"

          mkdir -p hf-deploy
          cp -r backend/        hf-deploy/
          cp -r trading_engine/ hf-deploy/
          cp -r logs/           hf-deploy/
          cp    Dockerfile      hf-deploy/
          cp    README.hf.md    hf-deploy/README.md

          cd hf-deploy
          git init
          git add .
          git commit -m "Deploy from GitHub Actions (${GITHUB_SHA::7})"
          git push \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main --force

  # ── Frontend → Vercel ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run:  npm ci
        working-directory: frontend

      - name: Build
        run:  npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        run: npx vercel --cwd frontend/ --token ${{ secrets.VERCEL_TOKEN }} --yes --prod
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
